app-id: org.croftonix.Cronix
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: cronix

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --env=QTWEBENGINE_DISABLE_SANDBOX=1

modules:

  # ── mit-krb5 (provides libgssapi_krb5.so.2 required by QtWebEngine) ──────────
  - name: mit-krb5
    buildsystem: simple
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.21/krb5-1.21.3.tar.gz
        sha256: b7a4cd5ead67fb08b980b21abd150ff7217e85ea320c9ed0c6dadd304840ad35
    build-commands:
      - cd src && autoreconf -i
      - cd src && ./configure --prefix=/app --disable-static --enable-shared
      - cd src && make -j$(nproc)
      - cd src && make install

  # ── PyQt6-sip ─────────────────────────────────────────────────────────────────
  - name: python3-pyqt6-sip
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/fa/54/77b4e08135ca98384d378917dd2da02a5bc86a7fb190fa4a22dccc826492/PyQt6_sip-13.8.0-cp312-cp312-manylinux_2_5_x86_64.manylinux1_x86_64.whl
        sha256: 08dd81037a2864982ece2bf9891f3bf4558e247034e112993ea1a3fe239458cb
    build-commands:
      - pip3 install --no-deps --prefix=/app
          PyQt6_sip-13.8.0-cp312-cp312-manylinux_2_5_x86_64.manylinux1_x86_64.whl

  # ── PyQt6-Qt6 ─────────────────────────────────────────────────────────────────
  - name: python3-pyqt6-qt6
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/57/56/b653a011af4b821b1ad0b20b554f351cf8331127ffd4cd60696bc8576655/PyQt6_Qt6-6.7.1-py3-none-manylinux_2_28_x86_64.whl
        sha256: 9fbab2a96d72d77d16021e259ef86a1a3c87adb0e7eebcc92df0d39f3fdf7e27
    build-commands:
      - pip3 install --no-deps --prefix=/app
          PyQt6_Qt6-6.7.1-py3-none-manylinux_2_28_x86_64.whl

  # ── PyQt6 ─────────────────────────────────────────────────────────────────────
  - name: python3-pyqt6
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/e4/d3/8789879c05cfe06127c4b59258632bd175fcdd9eaaadaf0c897b458fb91d/PyQt6-6.7.1-1-cp38-abi3-manylinux_2_28_x86_64.whl
        sha256: c2f202b7941aa74e5c7e1463a6f27d9131dbc1e6cabe85571d7364f5b3de7397
    build-commands:
      - pip3 install --no-deps --prefix=/app
          PyQt6-6.7.1-1-cp38-abi3-manylinux_2_28_x86_64.whl

  # ── PyQt6-WebEngine-Qt6 ───────────────────────────────────────────────────────
  - name: python3-pyqt6-webengine-qt6
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/07/f7/5ee927a220e0b848d9ae726c2daa4682b179ea3a7f980e60818f3eab3e50/PyQt6_WebEngine_Qt6-6.7.0-py3-none-manylinux_2_28_x86_64.whl
        sha256: 8f15fad765d6a2fbacc01bb23330ba1ea362fd289fcdb52e8270a799138746c5
    build-commands:
      - pip3 install --no-deps --prefix=/app
          PyQt6_WebEngine_Qt6-6.7.0-py3-none-manylinux_2_28_x86_64.whl

  # ── PyQt6-WebEngine ───────────────────────────────────────────────────────────
  - name: python3-pyqt6-webengine
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/66/ea/9b8d93a5c81b536378c817b69ae373ab0c09e43878013a0aa5cd092e6f5e/PyQt6_WebEngine-6.7.0-cp38-abi3-manylinux_2_28_x86_64.whl
        sha256: 098b5f8d5903a3091010098694f84dd786cca878ee28a5a3ce651507d5d65468
    build-commands:
      - pip3 install --no-deps --prefix=/app
          PyQt6_WebEngine-6.7.0-cp38-abi3-manylinux_2_28_x86_64.whl

  # ── cryptography ──────────────────────────────────────────────────────────────
  - name: python3-cryptography
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/fa/e2/b7e6e8c261536c489d9cf908769880d94bd5d9a187e166b0dc838d2e6a56/cryptography-42.0.8-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: 9c0c1716c8447ee7dbf08d6db2e5c41c688544c61074b54fc4564196f55c25a7
    build-commands:
      - pip3 install --no-deps --prefix=/app
          cryptography-42.0.8-cp39-abi3-manylinux_2_28_x86_64.whl

  # ── Cronix browser ────────────────────────────────────────────────────────────
  - name: cronix
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/james15-spec/Cronix-browser/releases/download/v1.4.1/cronix.deb
        sha256: ee483607b25b283b94d1e94133a9167767788a6501ce18d98690cc90b55b582f
        dest-filename: cronix.deb

    build-commands:
      - ar x cronix.deb
      - mkdir -p deb_data
      - |
        for f in data.tar.xz data.tar.gz data.tar.zst data.tar.bz2; do
          [ -f "$f" ] && tar xf "$f" -C deb_data && break
        done
      - mkdir -p /app/bin /app/share/cronix /app/share/pixmaps
          /app/share/applications /app/share/icons/hicolor/256x256/apps
          /app/share/icons/hicolor/48x48/apps
          /app/share/icons/hicolor/scalable/apps
      - cp -r deb_data/usr/share/cronix/* /app/share/cronix/
      - cp deb_data/usr/share/pixmaps/cronix.png /app/share/pixmaps/ 2>/dev/null || true
      - cp deb_data/usr/share/icons/hicolor/256x256/apps/cronix.png
          /app/share/icons/hicolor/256x256/apps/ 2>/dev/null || true
      - cp deb_data/usr/share/icons/hicolor/48x48/apps/cronix.png
          /app/share/icons/hicolor/48x48/apps/ 2>/dev/null || true
      - cp deb_data/usr/share/icons/hicolor/scalable/apps/cronix.svg
          /app/share/icons/hicolor/scalable/apps/ 2>/dev/null || true
      - |
        printf '#!/bin/bash\nexec python3 /app/share/cronix/cronix.py "$@"\n' \
          > /app/bin/cronix
      - chmod +x /app/bin/cronix
      - cp deb_data/usr/share/applications/cronix.desktop
          /app/share/applications/org.croftonix.Cronix.desktop
      - sed -i 's|^Icon=.*|Icon=org.croftonix.Cronix|'
          /app/share/applications/org.croftonix.Cronix.desktop
      - sed -i 's|^Exec=.*|Exec=cronix %u|'
          /app/share/applications/org.croftonix.Cronix.desktop
      - cp /app/share/pixmaps/cronix.png
          /app/share/icons/hicolor/256x256/apps/org.croftonix.Cronix.png
